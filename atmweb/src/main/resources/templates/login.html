<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>ATM Login</title>

    <style>

        body{
            background:#1a1a1a;
            font-family:Arial;
        }

        .atm{
            width:400px;
            margin:auto;
            margin-top:120px;
            background:#333;
            padding:30px;
            border-radius:15px;
            text-align:center;
        }

        .screen{
            background:#0a3d62;
            padding:25px;
            border-radius:10px;
            color:white;
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:85%;
            padding:10px;
            margin-top:10px;
            border:none;
            border-radius:5px;
        }

        button{
            margin-top:15px;
            background:#003399;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#0055cc;
        }

        .info{
            margin-top:20px;
            font-size:12px;
            color:#ccc;
        }

    </style>

</head>

<body>

<div class="atm">

    <div class="screen">

        <h2>🏦 Blue Bank ATM</h2>

        <form action="/login" method="post">

            <input type="text"
                   name="card"
                   placeholder="Enter Card Number"
                   required>

            <br>

            <input type="password"
                   name="pin"
                   placeholder="Enter PIN"
                   required>

            <br>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="info">

            <p>Demo Cards</p>

            <p>
                Card: 1234567890123456 <br>
                PIN: 1234
            </p>

            <p>
                Card: 1111222233334444 <br>
                PIN: 4567
            </p>

        </div>

    </div>

</div>

</body>
</html>
